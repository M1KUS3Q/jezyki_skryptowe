# Sample configuration for paper-aggregator.
# Copy this to ~/.config/paper-aggregator/config.toml and edit as needed.
#
# Environment variables take precedence over this file:
#   PAPER_AGGREGATOR_API_KEY  — your API key (always kept in env, never in this file)

# OpenAI-compatible API endpoint. Examples:
#   https://api.openai.com/v1               (OpenAI)
#   http://localhost:11434/v1               (Ollama)
#   https://api.mistral.ai/v1               (Mistral via compatible proxy)
api_base_url = "https://api.openai.com/v1"

# Default LLM model — use any model your endpoint supports.
model = "gpt-4o-mini"

# Maximum characters of paper text sent to the LLM.
# Enough for title, abstract, intro, and keywords.
max_context_chars = 6000

# Where to store the SQLite database.
# Default: ~/.local/share/paper-aggregator/papers.db
# db_path = "/custom/path/papers.db"

# Where to store downloaded PDFs.
# Default: ~/.local/share/paper-aggregator/pdfs/
# pdf_storage_path = "/custom/path/pdfs"
